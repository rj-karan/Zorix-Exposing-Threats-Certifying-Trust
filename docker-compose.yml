version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: zorix_db
    environment:
      POSTGRES_DB: zorix
      POSTGRES_USER: zorix_user
      POSTGRES_PASSWORD: zorix_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zorix_user -d zorix"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    container_name: zorix_backend
    env_file:
      - backend/.env.dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./reports:/app/reports
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: production
    container_name: zorix_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: